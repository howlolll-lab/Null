<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | 思緒重組</title>
    <style>
        :root { --bg: #E5E5E5; --card: #F0F0F0; --text: #4A4A4A; --muted: #9A9A9A; --accent: #8E9775; --border: #D8D8D8; --hi: #D1D5C8; }
        body { background: var(--bg); color: var(--text); font-family: monospace; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        .p-left { flex: 1.3; padding: 50px; display: flex; flex-direction: column; }
        .p-right { flex: 0.7; padding: 50px; background: #DBDBDB; display: flex; flex-direction: column; gap: 20px; border-left: 1px solid var(--border); overflow-y: auto; }
        textarea { flex: 1; background: transparent; border: none; border-top: 1px solid var(--border); font-size: 1.1rem; padding-top: 20px; outline: none; resize: none; color: var(--text); }
        .card { background: var(--card); padding: 20px; border-radius: 2px; }
        .card h3 { font-size: 0.7rem; color: var(--muted); margin: 0 0 10px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        #status { font-size: 0.7rem; color: var(--accent); margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="p-left">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:0.8rem;">
            <b style="letter-spacing:2px">PROJECT: NULL</b>
            <span id="clock"></span>
        </div>
        <div id="status">正在重組思緒中...</div>
        <textarea id="input" placeholder="在這裡輸入任何煩惱，按 Enter 卸載..."></textarea>
    </div>

    <div class="p-right">
        <div class="card" style="background:var(--hi); text-align:center;">
            <div style="font-size:0.7rem">TARGET: 04/10</div>
            <div id="timer" style="font-size:1.5rem; font-weight:bold">--D --H</div>
        </div>
        <div class="card"><h3>FACTS</h3><div id="f" style="font-size:0.9rem">等待中...</div></div>
        <div class="card" style="border-left:4px solid var(--accent)"><h3>ACTION</h3><div id="a" style="font-size:0.9rem">等待中...</div></div>
        <div class="card" style="opacity:0.5"><h3>PARKING</h3><div id="p" style="font-size:0.9rem">等待中...</div></div>
    </div>

    <script>
        // 1. 這裡請只貼上那串長長的 Key，不要有空格，不要有 :1
        const KEY = "AIzaSyBRl3rnqguZYnnXzXj8YMQ2DozaQFz1SSI"; 

        const input = document.getElementById('input');
        const status = document.getElementById('status');

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = input.value.trim();
                if (!text) return;

                status.style.display = 'block';
                input.value = '';

                // 2. 正確的 API 網址
                const url = "https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=" + KEY;

                const prompt = `你是一個冷靜的思緒整理大師。請分析這段文字，並嚴格以 JSON 格式回傳（不含任何其他說明文字）：
                { "facts": "條列式事實", "action": "一個15分鐘微行動", "parking": "暫時放下的事" }
                輸入文字：${text}`;

                try {
                    const res = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });

                    const data = await res.json();
                    
                    if (data.error) {
                        document.getElementById('f').innerText = "錯誤: " + data.error.message;
                    } else {
                        const rawText = data.candidates[0].content.parts[0].text;
                        const json = JSON.parse(rawText.match(/\{[\s\S]*\}/)[0]);
                        document.getElementById('f').innerHTML = json.facts;
                        document.getElementById('a').innerText = json.action;
                        document.getElementById('p').innerText = json.parking;
                    }
                } catch (err) {
                    document.getElementById('f').innerText = "分析出錯了，請檢查 Key。";
                    console.error(err);
                } finally {
                    status.style.display = 'none';
                }
            }
        });

        // 輔助功能
        function tick(){
            document.getElementById('clock').innerText = new Date().toLocaleString();
            const diff = new Date('2026-04-10') - new Date();
            if(diff > 0) {
                const d = Math.floor(diff/86400000);
                const h = Math.floor((diff%86400000)/3600000);
                document.getElementById('timer').innerText = d + "D " + h + "H";
            }
        }
        setInterval(tick, 1000); tick();
    </script>
</body>
</html>
