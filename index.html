<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sift | 職涯轉折重組器</title>
    <style>
        :root {
            --bg-color: #E5E5E5;      /* 淺灰底 */
            --card-bg: #F0F0F0;       /* 卡片微亮灰 */
            --text-main: #4A4A4A;     /* 深灰字 */
            --text-muted: #8E8E8E;    /* 隱藏字 */
            --accent: #8E9775;        /* 莫蘭迪綠 (行動) */
            --border: #D1D1D1;        /* 邊框線 */
            --highlight: #C2C8B5;     /* 倒數計時背景 */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', 'PingFang TC', 'Microsoft JhengHei', monospace;
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 左側：書寫區 */
        .write-panel {
            flex: 1.2;
            padding: 40px 60px;
            display: flex;
            flex-direction: column;
        }

        .header-info {
            margin-bottom: 20px;
            font-size: 0.8rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            line-height: 1.8;
            resize: none;
            outline: none;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }
