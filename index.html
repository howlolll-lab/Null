<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | 思緒重組</title>
    <style>
        :root {
            --bg-color: #E5E5E5;
            --card-bg: #F0F0F0;
            --text-main: #4A4A4A;
            --text-muted: #9A9A9A;
            --accent: #8E9775;
            --border: #D8D8D8;
            --highlight: #D1D5C8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', 'PingFang TC', 'Microsoft JhengHei', monospace;
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .write-panel {
            flex: 1.3;
            padding: 50px 70px;
            display: flex;
            flex-direction: column;
        }

        .header-info {
            margin-bottom: 25px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.1rem;
        }

        /* 標題正式改為 NULL */
        .project-name {
            font-weight: bold;
            color: var(--text-main);
            font-size: 1.2rem;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            line-height: 1.9;
            resize: none;
            outline: none;
            border-top: 1px solid var(--border);
            padding-top: 30px;
        }

        .analysis-panel {
            flex: 0.7;
            padding: 50px 40px;
            background-color: #DBDBDB;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-left: 1px solid var(--border);
            overflow-y: auto;
        }

        .countdown-box {
            background: var(--highlight);
            padding: 20px;
            border-radius: 2px;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 2px;
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }
    </style>
</head>
<body>

    <div class="write-panel">
        <div class="header-info">
            <span class="project-name">NULL</span>
            <span id="current-time"></span>
        </div>
        <textarea placeholder="將混亂的思緒輸入於此，直到它們歸零 (NULL)..."></textarea>
    </div>

    <div class="analysis-panel">
        <div class="countdown-box">
            <span style="font-size: 0.7rem;">DEPARTURE COUNTDOWN (04/10)</span>
            <div id="timer" style="font-size: 1.8rem; font-weight: bold;">--D --H</div>
        </div>

        <div class="card">
            <h3>LOG / 紀錄</h3>
            <div id="log-content" style="font-size: 0.9rem;">等待輸入資料中...</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateTimer() {
            const target = new Date('2026-04-10T00:00:00');
            const now = new Date();
            const diff = target - now;
            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                document.getElementById('timer').innerText = days + "D " + hours + "H";
            }
        }
        setInterval(updateTimer, 60000);
        updateTimer();
    </script>
</body>
</html>
