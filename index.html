<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | 思緒重組</title>
    <style>
        :root {
            --bg-color: #E5E5E5;
            --card-bg: #F0F0F0;
            --text-main: #4A4A4A;
            --text-muted: #9A9A9A;
            --accent: #8E9775;
            --border: #D8D8D8;
            --highlight: #D1D5C8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', 'PingFang TC', 'Microsoft JhengHei', monospace;
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* 左側輸入區 */
        .write-panel {
            flex: 1.3;
            padding: 50px 70px;
            display: flex;
            flex-direction: column;
        }

        .header-info {
            margin-bottom: 25px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.1rem;
        }

        .project-name {
            font-weight: bold;
            color: var(--text-main);
            font-size: 1.2rem;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            line-height: 1.9;
            resize: none;
            outline: none;
            border-top: 1px solid var(--border);
            padding-top: 30px;
        }

        /* 右側分析區 */
        .analysis-panel {
            flex: 0.7;
            padding: 50px 40px;
            background-color: #DBDBDB;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-left: 1px solid var(--border);
            overflow-y: auto;
        }

        .countdown-box {
            background: var(--highlight);
            padding: 20px;
            border-radius: 2px;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 2px;
            margin-bottom: 5px;
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        .card-content {
            font-size: 0.9rem;
            line-height: 1.7;
            white-space: pre-line; /* 保留換行 */
        }

        .action-card {
            border-left: 4px solid var(--accent);
        }

        .status-msg {
            font-size: 0.7rem;
            color: var(--accent);
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="write-panel">
        <div class="header-info">
            <span class="project-name">NULL</span>
            <span id="current-time"></span>
        </div>
        <div id="status" class="status-msg">NULL 正在重組思緒中...</div>
        <textarea id="userInput" placeholder="輸入思緒後按下 Enter 卸載... (AI 將自動分析)"></textarea>
    </div>

    <div class="analysis-panel">
        <div class="countdown-box">
            <span style="font-size: 0.7rem; letter-spacing: 0.1rem;">DEPARTURE (04/10)</span>
            <div id="timer" style="font-size: 1.8rem; font-weight: bold;">--D --H</div>
        </div>

        <div class="card">
            <h3>FACTS / 事實分析</h3>
            <div id="fact-content" class="card-content">等待卸載思緒...</div>
        </div>
        
        <div class="card action-card">
            <h3>ACTION / 15-MIN 微行動</h3>
            <div id="action-content" class="card-content">完成分析後將在此顯示建議。</div>
        </div>

        <div class="card" style="opacity: 0.5;">
            <h3>PARKING / 懸置</h3>
            <div id="parking-content" class="card-content">讓它暫時停在這裡。</div>
        </div>
    </div>

    <script>
        // 【重要】請在此處精確填入你的 API Key
        const API_KEY = "AIzaSyBRl3rnqguZYnnXzXj8YMQ2DozaQFz1SSI"; 

        const textarea = document.getElementById('userInput');
        const statusMsg = document.getElementById('status');
        const factContent = document.getElementById('fact-content');
        const actionContent = document.getElementById('action-content');
        const parkingContent = document.getElementById('parking-content');

        // 偵測 Enter 鍵
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = textarea.value.trim();
                if (text) {
                    callAI(text);
                    textarea.value = ''; // 執行 NULL (歸零)
                }
            }
        });

        // 呼叫 AI 邏輯
        async function callAI(text) {
            statusMsg.style.display = 'block';
            
            // 使用 v1beta 搭配 flash-latest 是目前最穩定的組合
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;
            
            const prompt = `你是一個專業的思緒整理大師。請分析這段文字，並嚴格以 JSON 格式回傳，不要有任何前言或結語。
            JSON格式範例：{ "facts": "條列事實", "action": "具體微行動", "parking": "暫時放下的事" }
            輸入內容：${text}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (data.error) {
                    factContent.innerText = "API 錯誤: " + data.error.message;
                } else {
                    const aiResponse = data.candidates[0].content.parts[0].text;
                    // 使用正則表達式精準抓取 JSON 區塊
                    const jsonMatch = aiResponse.match(/\{[\s\S]*\}/);
                    
                    if (jsonMatch) {
                        const result = JSON.parse(jsonMatch[0]);
                        factContent.innerText = result.facts;
                        actionContent.innerText = result.action;
                        parkingContent.innerText = result.parking;
                    }
                }
            } catch (error) {
                console.error("發生錯誤:", error);
                factContent.innerText = "連線失敗，請檢查網路或 API Key。";
            } finally {
                statusMsg.style.display = 'none';
            }
        }

        // 時鐘與倒數功能
        function updateClock() {
            document.getElementById('current-time').innerText = new Date().toLocaleString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateTimer() {
            const diff = new Date('2026-04-10T00:00:00') - new Date();
            if (diff > 0) {
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                document.getElementById('timer').innerText = `${d}D ${h}H`;
            }
        }
        setInterval(updateTimer, 60000);
        updateTimer();
    </script>
</body>
</html>
