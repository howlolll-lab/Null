<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | 思緒重組</title>
    <style>
        :root {
            --bg-color: #E5E5E5;
            --card-bg: #F0F0F0;
            --text-main: #4A4A4A;
            --text-muted: #9A9A9A;
            --accent: #8E9775;
            --border: #D8D8D8;
            --highlight: #D1D5C8;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'JetBrains Mono', 'PingFang TC', 'Microsoft JhengHei', monospace;
            display: flex;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .write-panel {
            flex: 1.3;
            padding: 50px 70px;
            display: flex;
            flex-direction: column;
        }

        .header-info {
            margin-bottom: 25px;
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            letter-spacing: 0.1rem;
        }

        .project-name {
            font-weight: bold;
            color: var(--text-main);
            font-size: 1.2rem;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            line-height: 1.9;
            resize: none;
            outline: none;
            border-top: 1px solid var(--border);
            padding-top: 30px;
        }

        .analysis-panel {
            flex: 0.7;
            padding: 50px 40px;
            background-color: #DBDBDB;
            display: flex;
            flex-direction: column;
            gap: 25px;
            border-left: 1px solid var(--border);
            overflow-y: auto;
        }

        .countdown-box {
            background: var(--highlight);
            padding: 20px;
            border-radius: 2px;
            text-align: center;
        }

        .card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 2px;
            margin-bottom: 5px;
        }

        .card h3 {
            margin: 0 0 15px 0;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        .card-content {
            font-size: 0.9rem;
            line-height: 1.7;
        }

        .action-card {
            border-left: 4px solid var(--accent);
        }

        .status-msg {
            font-size: 0.7rem;
            color: var(--accent);
            margin-top: 10px;
            display: none; /* 平時隱藏 */
        }
    </style>
</head>
<body>

    <div class="write-panel">
        <div class="header-info">
            <span class="project-name">NULL</span>
            <span id="current-time"></span>
        </div>
        <textarea id="userInput" placeholder="輸入思緒後按下 Enter 卸載... (AI 將自動分析)"></textarea>
        <div id="status" class="status-msg">AI 正在重組思緒中...</div>
    </div>

    <div class="analysis-panel">
        <div class="countdown-box">
            <span style="font-size: 0.7rem; letter-spacing: 0.1rem;">DEPARTURE (04/10)</span>
            <div id="timer" style="font-size: 1.8rem; font-weight: bold;">--D --H</div>
        </div>

        <div class="card">
            <h3>FACTS / 事實分析</h3>
            <div id="fact-content" class="card-content">等待卸載思緒...</div>
        </div>
        
        <div class="card action-card">
            <h3>ACTION / 15-MIN 微行動</h3>
            <div id="action-content" class="card-content">完成分析後將在此顯示建議。</div>
        </div>

        <div class="card" style="opacity: 0.5;">
            <h3>PARKING / 懸置</h3>
            <div id="parking-content" class="card-content">讓它暫時停在這裡。</div>
        </div>
    </div>

    <script>
        // 【重要】請在此處填入你申請到的 API Key
        const API_KEY = "AIzaSyBRl3rnqguZYnnXzXj8YMQ2DozaQFz1SSI"; 

        const textarea = document.getElementById('userInput');
        const statusMsg = document.getElementById('status');
        const factContent = document.getElementById('fact-content');
        const actionContent = document.getElementById('action-content');
        const parkingContent = document.getElementById('parking-content');

        // 偵測 Enter 鍵觸發 AI 分析
        textarea.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const text = textarea.value.trim();
                if (text && API_KEY !== "在這裡貼上你的KEY") {
                   // 呼叫 Gemini AI 的大腦邏輯
        async function callAI(text) {
            statusMsg.style.display = 'block';
            statusMsg.innerText = "NULL 正在重組思緒中...";
            
            // 修正點：使用 v1 版本並確保使用反引號包圍網址
            const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
            
            const prompt = `你是一個冷靜、專業的「思緒整理大師」。分析這段文字，並嚴格以 JSON 格式回傳，不要有額外說明文字。
            JSON格式：{ "facts": "條列式事實", "action": "一個15分鐘內可完成的行動", "parking": "一件目前可以先放下不管的事" }
            輸入文字：${text}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();

                // 檢查 API 是否回傳錯誤
                if (data.error) {
                    throw new Error(data.error.message);
                }

                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    let responseText = data.candidates[0].content.parts[0].text;
                    
                    // 清洗 JSON 格式（排除 AI 多話的可能性）
                    const jsonMatch = responseText.match(/\{[\s\S]*\}/);
                    if (jsonMatch) {
                        const result = JSON.parse(jsonMatch[0]);
                        
                        // 更新右側介面
                        document.getElementById('fact-content').innerHTML = result.facts.replace(/\n/g, '<br>');
                        document.getElementById('action-content').innerText = result.action;
                        document.getElementById('parking-content').innerText = result.parking;
                    }
                }

                statusMsg.style.display = 'none';

            } catch (error) {
                console.error("連線出錯:", error);
                statusMsg.innerText = "分析失敗：" + error.message;
            }
        }
            
            const prompt = `你是一個冷靜、專業的「思緒整理大師」。
            使用者的背景：在傳統製造業工作滿三年，預計2026/04/10離職，未來想去日本遊學一個月。
            任務：分析這段文字，並嚴格以 JSON 格式回傳，不要有額外文字。
            JSON格式示例：{ "facts": "條列式事實", "action": "一個15分鐘內可完成的行動", "parking": "一件目前可以先放下不管的事" }
            輸入文字：${text}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const responseText = data.candidates[0].content.parts[0].text;
                const cleanJson = responseText.replace(/```json|```/g, '').trim();
                const result = JSON.parse(cleanJson);
                
                // 更新右側介面內容
                factContent.innerHTML = result.facts.replace(/\n/g, '<br>');
                actionContent.innerText = result.action;
                parkingContent.innerText = result.parking;
                statusMsg.style.display = 'none';

            } catch (error) {
                console.error("AI 分析發生錯誤:", error);
                statusMsg.innerText = "分析失敗，請檢查 API Key 或網路。";
            }
        }

        // 時鐘與倒數功能
        function updateClock() {
            document.getElementById('current-time').innerText = new Date().toLocaleString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function updateTimer() {
            const diff = new Date('2026-04-10T00:00:00') - new Date();
            if (diff > 0) {
                const d = Math.floor(diff / 86400000);
                const h = Math.floor((diff % 86400000) / 3600000);
                document.getElementById('timer').innerText = `${d}D ${h}H`;
            }
        }
        setInterval(updateTimer, 60000);
        updateTimer();
    </script>
</body>
</html>
